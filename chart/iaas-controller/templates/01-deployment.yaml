{{- $t := .Values.thalassa | default dict }}
{{- $te := $t.tokenExchange | default dict }}
{{- $proj := $te.projectedToken | default dict }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iaasController.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "iaasController.labels" . | nindent 4 }}
spec:
  strategy:
    type: RollingUpdate
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "iaasController.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "iaasController.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iaasController.serviceAccountName" . }}
      restartPolicy: Always
      enableServiceLinks: false
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
          - /iaas-controller
          {{- range .Values.extraArgs }}
          - {{ . | quote }}
          {{- end }}

          {{- if .Values.leaderElection.enabled }}
          - --leader-elect=true
          - --leader-election-id={{ .Values.leaderElection.id | default "iaas-controller.k8s.thalassa.cloud" }}
          - --leader-election-namespace={{ .Values.leaderElection.namespace | default .Release.Namespace }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.thalassa.enabled }}
          {{- if not $t.organisation }}
          {{- fail "thalassa.organisation is required" }}
          {{- end }}
          {{- if not $t.authMethod }}
          {{- fail "thalassa.authMethod is required: tokenExchange, pat, or oidcClientCredentials" }}
          {{- end }}
          env:
            - name: THALASSA_URL
              value: {{ $t.url | quote }}
            - name: THALASSA_ORGANISATION
              value: {{ $t.organisation | quote }}
            {{- if $t.region }}
            - name: THALASSA_REGION
              value: {{ $t.region | quote }}
            {{- end }}
            {{- if $t.project }}
            - name: THALASSA_PROJECT
              value: {{ $t.project | quote }}
            {{- end }}
            {{- if $t.insecure }}
            - name: THALASSA_INSECURE
              value: "true"
            {{- end }}
            {{- if eq $t.authMethod "tokenExchange" }}
            {{- if not $te.serviceAccountId }}
            {{- fail "thalassa.tokenExchange.serviceAccountId is required when authMethod is tokenExchange" }}
            {{- end }}
            - name: THALASSA_SERVICE_ACCOUNT_ID
              value: {{ $te.serviceAccountId | quote }}
            {{- if $te.subjectToken }}
            - name: THALASSA_SUBJECT_TOKEN
              value: {{ $te.subjectToken | quote }}
            {{- end }}
            {{- if $te.oidcTokenUrl }}
            - name: THALASSA_OIDC_TOKEN_URL
              value: {{ $te.oidcTokenUrl | quote }}
            {{- end }}
            {{- if $te.accessTokenLifetime }}
            - name: THALASSA_ACCESS_TOKEN_LIFETIME
              value: {{ $te.accessTokenLifetime | quote }}
            {{- end }}
            {{- if and (not $te.subjectToken) }}
            {{- if $te.subjectTokenFile }}
            - name: THALASSA_SUBJECT_TOKEN_FILE
              value: {{ $te.subjectTokenFile | quote }}
            {{- else if $proj.enabled }}
            - name: THALASSA_SUBJECT_TOKEN_FILE
              value: {{ printf "%s/%s" $proj.mountPath ($proj.path | default "token") | quote }}
            {{- end }}
            {{- end }}

            {{- else if eq $t.authMethod "pat" }}
            {{- if and (not $t.pat.existingSecret) (not $t.pat.token) }}
            {{- fail "for pat auth, set thalassa.pat.existingSecret (recommended) or thalassa.pat.token" }}
            {{- end }}
            {{- if $t.pat.token }}
            - name: THALASSA_TOKEN
              value: {{ $t.pat.token | quote }}
            {{- else }}
            - name: THALASSA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $t.pat.existingSecret | quote }}
                  key: {{ $t.pat.secretKey | default "token" | quote }}
            {{- end }}
            {{- else if eq $t.authMethod "oidcClientCredentials" }}
            {{- if not $t.oidcClientCredentials.clientId }}
            {{- fail "thalassa.oidcClientCredentials.clientId is required when authMethod is oidcClientCredentials" }}
            {{- end }}
            {{- if not $t.oidcClientCredentials.existingSecret }}
            {{- fail "thalassa.oidcClientCredentials.existingSecret is required when authMethod is oidcClientCredentials" }}
            {{- end }}
            - name: THALASSA_CLIENT_ID
              value: {{ $t.oidcClientCredentials.clientId | quote }}
            - name: THALASSA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $t.oidcClientCredentials.existingSecret | quote }}
                  key: {{ $t.oidcClientCredentials.clientSecretKey | default "client-secret" | quote }}
            {{- else }}
            {{- fail "thalassa.authMethod must be tokenExchange, pat, or oidcClientCredentials" }}
            {{- end }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          volumeMounts:
            - name: tempdir
              mountPath: /tmp
            {{- if and $t.enabled (eq $t.authMethod "tokenExchange") $proj.enabled (not $te.subjectTokenFile) (not $te.subjectToken) }}
            - name: thalassa-sa-token
              mountPath: {{ $proj.mountPath | quote }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: tempdir
          emptyDir: {}
        {{- if and $t.enabled (eq $t.authMethod "tokenExchange") $proj.enabled (not $te.subjectTokenFile) (not $te.subjectToken) }}
        - name: thalassa-sa-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  path: {{ $proj.path | default "token" }}
                  expirationSeconds: {{ $proj.expirationSeconds | default 3600 }}
                  {{- with $proj.audience }}
                  audience: {{ . | quote }}
                  {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
