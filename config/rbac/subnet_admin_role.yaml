# This rule is not used by the project iaas-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over iaas.controllers.thalassa.cloud.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: iaas-controller
    app.kubernetes.io/managed-by: kustomize
  name: subnet-admin-role
rules:
- apiGroups:
  - iaas.controllers.thalassa.cloud
  resources:
  - subnets
  verbs:
  - '*'
- apiGroups:
  - iaas.controllers.thalassa.cloud
  resources:
  - subnets/status
  verbs:
  - get
